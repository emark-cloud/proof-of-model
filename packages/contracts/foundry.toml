[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["dependencies"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
fs_permissions = [{ access = "read", path = "./" }, { access = "read", path = "../model" }]
remappings = ["forge-std/=dependencies/forge-std-1.9.4/src/"]

# Arbitrum Sepolia (dev) + Arbitrum One (x402 rail / final). RPC in repo .env / resources.md.
[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"
arbitrum_one = "${ARBITRUM_ONE_RPC_URL}"

# Etherscan V2 unified API (one key verifies all chains incl. Arbiscan). Set ETHERSCAN_API_KEY.
[etherscan]
arbitrum_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 421614, url = "https://api.etherscan.io/v2/api" }
arbitrum_one = { key = "${ETHERSCAN_API_KEY}", chain = 42161, url = "https://api.etherscan.io/v2/api" }

[soldeer]
remappings_generate = false

[dependencies]
forge-std = "1.9.4"
