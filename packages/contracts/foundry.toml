[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["dependencies"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
fs_permissions = [{ access = "read", path = "./" }]
remappings = ["forge-std/=dependencies/forge-std-1.9.4/src/"]

# Arbitrum Sepolia (dev) + Arbitrum One (x402 rail / final). RPC in repo .env / resources.md.
[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"
arbitrum_one = "${ARBITRUM_ONE_RPC_URL}"

[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }
arbitrum_one = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }

[soldeer]
remappings_generate = false

[dependencies]
forge-std = "1.9.4"
